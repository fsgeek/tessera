\* Bridge constants: KConf = 3 (Bitcoin-convention k) with DepthK = 2 —
\* the A2.1 convention pin instantiated, and CHECKED by PinAgreement
\* rather than assumed (the _BrokenPin cfg sets DepthK = 3 and must go
\* red). MaxSkew = 2 vs Delta = 2 keeps the skew adversarially
\* significant relative to the window, as A2.1's residuals require.
\* MaxBlocks = 4: anchor plus full burial plus one spare position.
CONSTANTS
  MaxTime = 6
  Delta = 2
  Epsilon = 1
  KConf = 3
  DepthK = 2
  MaxSkew = 2
  MaxBlocks = 4

INIT Init
NEXT Next

INVARIANTS
  PinAgreement
  ShippedDesignatedAgree
  HonestShipAccepted
  LateBurialRejected
