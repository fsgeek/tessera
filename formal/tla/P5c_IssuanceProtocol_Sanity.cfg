\* Vacuity check: run with `tlc2.TLC -continue`, piping through
\* `scripts/filter-tlc-output.sh` before committing the .out — the
\* committed artifact keeps the first violation trace per witness and
\* drops the repetitions (at MaxTime = 14 the raw dump is ~100k lines;
\* record-norms ruling 2026-07-21). TLC VIOLATING all seven
\* invariants is the healthy result — shipping is reachable at all, after
\* a re-issue, and after surviving a reorg; refusal is reachable at all,
\* after a reorg, with a live (late, worthless) anchor present, and with
\* that anchor buried to full depth post-refusal — so the main cfg's
\* invariants are not vacuously true. If RefusalUnreachable survives,
\* MaxTime is too small for the final window to expire (need
\* MaxTime >= MaxAttempts * (Delta + 1)); if
\* RefusalBuriedAnchorUnreachable survives, the post-refusal burial path
\* is untested (need the + DepthK headroom = 14).
\*
\* ORDER MATTERS: TLC reports only the FIRST failing invariant per state.
\* Shipped states and refused states are disjoint, so the two families
\* cannot mask each other — but within each family the broad witness
\* (ShipUnreachable / RefusalUnreachable) fails in every shipped/refused
\* state and is listed last so it cannot mask the specific ones.
\* RefusalBuriedAnchor states are a subset of RefusalWithLiveAnchor
\* states, so the buried witness is listed before the live-anchor one.
CONSTANTS
  MaxTime = 14
  Delta = 3
  DepthK = 2
  MaxAttempts = 3

INIT Init
NEXT Next

INVARIANTS
  ReorgShipUnreachable
  ReissueShipUnreachable
  ShipUnreachable
  RefusalAfterReorgUnreachable
  RefusalBuriedAnchorUnreachable
  RefusalWithLiveAnchorUnreachable
  RefusalUnreachable
