\* Vacuity check: run with `tlc2.TLC -continue`. TLC VIOLATING all three
\* invariants is the healthy result — shipping is reachable at all,
\* reachable after a re-issue, and reachable after surviving a reorg, so
\* the main cfg's invariants are not vacuously true.
\*
\* ORDER MATTERS: TLC reports only the FIRST failing invariant per state,
\* and ShipUnreachable fails in every shipped state — listed last so it
\* cannot mask the more specific witnesses.
CONSTANTS
  MaxTime = 8
  Delta = 3
  DepthK = 2
  MaxAttempts = 3

INIT Init
NEXT Next

INVARIANTS
  ReorgShipUnreachable
  ReissueShipUnreachable
  ShipUnreachable
