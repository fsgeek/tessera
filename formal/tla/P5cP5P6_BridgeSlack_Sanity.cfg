\* Vacuity check: run with `tlc2.TLC -continue -deadlock`, piping through
\* `scripts/filter-tlc-output.sh` before committing the .out. TLC
\* VIOLATING all four invariants is the healthy result: shipping is
\* reachable under the strengthened (lifecycle-guarded) Ship; wall-clock
\* divergence is live WITHIN the slack envelope (shipAtWall past
\* declared + Delta — chain governs inside a bounded wall envelope,
\* which is the slack rule's point); the outcome-form laziness residue
\* is live even at sufficient slack (chain-valid, unshipped, lifecycle
\* expired — visible scope-narrowing of the analysis invariant to
\* opportunity rather than outcome); and the cutoff is achieved (burial
\* exactly at declared + Delta + Slack, chain-valid — the MaxSkew bound
\* is tight, so the iff is sharp at this discretization).
\*
\* ORDER: the two shipped-family witnesses first (divergence before the
\* generic ShipUnreachable so first-fail-per-state cannot mask it); the
\* two unshipped-family witnesses cannot be masked by the shipped family
\* (disjoint states).
CONSTANTS
  MaxTime = 6
  Delta = 2
  Epsilon = 1
  KConf = 3
  DepthK = 2
  MaxSkew = 2
  MaxBlocks = 4
  Slack = 2

INIT Init
NEXT Next

INVARIANTS
  WallClockDivergenceUnreachable
  ShipUnreachable
  LifecycleBindsUnreachable
  BurialAtCutoffUnreachable
