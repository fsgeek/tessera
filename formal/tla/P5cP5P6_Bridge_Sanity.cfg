\* Vacuity check: run with `tlc2.TLC -continue`, piping through
\* `scripts/filter-tlc-output.sh` before committing the .out. TLC
\* VIOLATING all six invariants is the healthy result: shipping is
\* reachable; the burial gap (confirmedAt differs from the anchor
\* timestamp) is real; the non-monotonic case (confirmedAt BEFORE the
\* anchor timestamp) is live; the epsilon side (anchor timestamp before
\* declared) is live — the phenomenon P5c's fused clock could not
\* represent; wall-clock/chain-time divergence is live (shipped after
\* the wall deadline with chain time in window); and the late-burial
\* abandoned artifact exists (the LateBurialRejected antecedent and the
\* _BrokenAnchorSubst tripwire are not vacuous).
\*
\* ORDER MATTERS (first-fail-per-state): the shipped-family witnesses
\* are listed most-specific-first (NonMonotonic implies BurialGap;
\* ShipUnreachable fails in every shipped state, listed last of its
\* family). The unshipped-family witnesses cannot be masked by the
\* shipped family (disjoint states).
CONSTANTS
  MaxTime = 6
  Delta = 2
  Epsilon = 1
  KConf = 3
  DepthK = 2
  MaxSkew = 2
  MaxBlocks = 4

INIT Init
NEXT Next

INVARIANTS
  NonMonotonicShipUnreachable
  WallClockDivergenceUnreachable
  BurialGapUnreachable
  ShipUnreachable
  LateBurialArtifactUnreachable
  EpsilonSideUnreachable
